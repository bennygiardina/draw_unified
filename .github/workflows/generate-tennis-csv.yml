name: Generate tennis matches CSV

on:
  workflow_dispatch:
    inputs:
      tour:
        description: "Tour da elaborare"
        required: true
        type: choice
        options:
          - atp
          - wta

      tournament_slug:
        description: "Slug file torneo, es. indian_wells oppure miami_open"
        required: true
        type: string

      tournament_url:
        description: "ATP: tournament URL"
        required: false
        default: ""
        type: string

      draw_page:
        description: "ATP: draw page URL"
        required: false
        default: ""
        type: string

      results_page:
        description: "ATP: results page URL"
        required: false
        default: ""
        type: string

      tournament_id:
        description: "ATP: tournament ID"
        required: false
        default: ""
        type: string

      year:
        description: "ATP: year"
        required: false
        default: ""
        type: string

      pdf_url:
        description: "WTA: PDF URL"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  generate-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pypdf urllib3 beautifulsoup4

      - name: Prepare output path
        run: |
          mkdir -p data
          OUTPUT_FILE="data/${{ inputs.tournament_slug }}_${{ inputs.tour }}.csv"
          echo "OUTPUT_FILE=$OUTPUT_FILE" >> "$GITHUB_ENV"
          echo "CSV finale: $OUTPUT_FILE"

      - name: Run parser
        run: |
          python run_tennis_parser.py \
            --tour "${{ inputs.tour }}" \
            --output "$OUTPUT_FILE" \
            --tournament-url "${{ inputs.tournament_url }}" \
            --draw-page "${{ inputs.draw_page }}" \
            --results-page "${{ inputs.results_page }}" \
            --tournament-id "${{ inputs.tournament_id }}" \
            --year "${{ inputs.year }}" \
            --pdf-url "${{ inputs.pdf_url }}"

      - name: Commit CSV if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"

          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare"
          else
            git commit -m "Update $(basename "$OUTPUT_FILE")"
            git push
          fi
